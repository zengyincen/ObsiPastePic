  <rect width="1600" height="480" rx="42" fill="url(#bg)"/>
  <ellipse cx="1420" cy="54" rx="260" ry="178" fill="#7A67FF" fill-opacity="0.17" filter="url(#soft)"/>
  <ellipse cx="84" cy="436" rx="252" ry="174" fill="#53C7FF" fill-opacity="0.23" filter="url(#soft)"/>

  <g filter="url(#shadow)">
    <use href="#banner-brand-icon" x="116" y="72" width="336" height="336"/>
  </g>

  <text x="526" y="225" fill="url(#word)" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="102" font-weight="720" letter-spacing="-4">Pastepic</text>
  <text x="532" y="294" fill="#52617B" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="34" font-weight="480" letter-spacing="0.4">Paste once. Upload anywhere. Read faster.</text>

  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" font-weight="620">
    <rect x="532" y="330" width="132" height="48" rx="24" fill="white" fill-opacity="0.72"/>
    <text x="568" y="361" fill="#2468B3">Paste</text>
    <rect x="678" y="330" width="144" height="48" rx="24" fill="white" fill-opacity="0.72"/>
    <text x="711" y="361" fill="#4B5AA4">Upload</text>
    <rect x="836" y="330" width="178" height="48" rx="24" fill="white" fill-opacity="0.72"/>
    <text x="867" y="361" fill="#624EA8">Accelerate</text>
  </g>

  <rect x="1" y="1" width="1598" height="478" rx="41" stroke="white" stroke-opacity="0.7" stroke-width="2"/>
</svg>
