      <stop stop-color="#07162C"/>
      <stop offset="0.48" stop-color="#0B2550"/>
      <stop offset="1" stop-color="#24164A"/>
    </linearGradient>
    <linearGradient id="glass" x1="180" y1="144" x2="760" y2="750" gradientUnits="userSpaceOnUse">
